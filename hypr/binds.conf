# ============================================
# ATEJOS DE TECLADO
# ============================================

# Variables
$mod = SUPER

# ------------------- Sistema -------------------
bind = $mod, M, exit
bind = $mod, W, togglefloating
bind = $mod, Q, killactive
bind = $mod, F, fullscreen

# ------------------- Lanzadores -------------------
bind = $mod, RETURN, exec, alacritty
bind = $mod, D, exec, wofi --show drun

# ------------------- Scratchpad -------------------
bind = $mod,       SPACE, exec, ~/.config/hypr/toggle-scratch.sh
bind = $mod SHIFT, SPACE, movetoworkspacesilent, special:scratch

# ------------------- Workspaces -------------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8

bind = $mod, RIGHT, workspace, e+1
bind = $mod, LEFT, workspace, e-1

# ------------------- Mover ventanas a workspace -------------------
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8

# ------------------- Movimiento de ventanas -------------------
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ------------------- Portapapeles -------------------
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ------------------- Claude Code -------------------
bind = $mod, C, exec, kitty --title claude-code -e ~/.local/bin/claude


# ------------------- Multimedia -------------------
# Volumen
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Reproducción
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
bind = , XF86AudioStop,  exec, playerctl stop

# Brillo
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ------------------- Screenshots -------------------
bind = $mod,       P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, P, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Guardado en ~/Pictures/Screenshots"

# ------------------- Modo Juego -------------------
bind = $mod, G, exec, ~/.config/hypr/toggle-gamemode.sh


