# ============================================
# VARIABLES DE ENTORNO
# ============================================

env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_RUNTIME_DIR,/run/user/1000

# Forzar Hyprland a usar la GPU Intel para el escritorio
env = AQ_DRM_DEVICES,/dev/dri/card1

# NVIDIA - CONFIGURACIÓN COMPLETA PARA RENDIMIENTO
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = AQ_NO_MODIFIERS,1              # <-- CLAVE: Previene problemas de buffers
env = WLR_NO_HARDWARE_CURSORS,1      # <-- Evita bugs de cursor/rendering
env = __GL_GSYNC_ALLOWED,1           # <-- Permite G-SYNC
env = __GL_VRR_ALLOWED,1             # <-- Permite VRR
env = WLR_DRM_NO_MODIFIERS,1         # <-- Ayuda con problemas de memoria

