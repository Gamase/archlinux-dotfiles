# ============================================
# ARCHIVO PRINCIPAL DE HYPRLAND
# ============================================

# Importar configuraciones modulares
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/windows-rules.conf

# Ejecutar scripts al inicio
exec-once = ~/.config/hypr/startup.sh
exec-once = ~/.config/waybar/scripts/bluetooth-scan-daemon.sh

# Configuración general
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(ff0033ff) rgba(880011ff) 45deg
    col.inactive_border = rgba(1a0008ff)
    resize_on_border = true
    layout = dwindle
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(ff003366)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = true

    bezier = snappy,   0.25, 1.0,  0.5,  1.0
    bezier = overshot, 0.05, 0.9,  0.1,  1.05
    bezier = linear,   0.0,  0.0,  1.0,  1.0

    animation = windows,          1, 4, overshot, slide
    animation = windowsOut,       1, 3, snappy,   popin 80%
    animation = windowsMove,      1, 3, snappy
    animation = border,           1, 6, linear
    animation = fade,             1, 4, snappy
    animation = workspaces,       1, 4, snappy,   slide
    animation = specialWorkspace, 1, 4, snappy,   slidevert
}
