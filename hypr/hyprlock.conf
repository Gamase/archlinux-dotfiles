# ~/.config/hypr/hyprlock.conf

# ============================================================
# FONDO
# ============================================================
background {
    monitor =
    path = ~/.config/hypr/wallpapers/fondo.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.38
    contrast = 0.9
    vibrancy = 0.15
}

# ============================================================
# PANEL — borde exterior (glow sutil)
# ============================================================
shape {
    monitor =
    size = 408, 368
    color = rgba(255, 0, 40, 0.04)
    rounding = 22
    border_size = 1
    border_color = rgba(255, 0, 40, 0.22)
    position = 0, 60
    halign = center
    valign = center
}

# PANEL — interior oscuro
shape {
    monitor =
    size = 396, 356
    color = rgba(5, 0, 10, 0.78)
    rounding = 18
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    position = 0, 60
    halign = center
    valign = center
}

# ============================================================
# CABECERA
# ============================================================
label {
    monitor =
    text = ·  S Y S T E M   L O C K E D  ·
    color = rgba(150, 8, 8, 0.55)
    font_size = 10
    font_family = JetBrains Mono Bold
    position = 0, 228
    halign = center
    valign = center
}

# ============================================================
# RELOJ
# ============================================================
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255, 22, 22, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraLight
    position = 0, 148
    halign = center
    valign = center
}

# ============================================================
# FECHA
# ============================================================
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(200, 12, 12, 0.78)
    font_size = 14
    font_family = JetBrains Mono Bold
    position = 0, 64
    halign = center
    valign = center
}

# ============================================================
# SEPARADOR
# ============================================================
shape {
    monitor =
    size = 260, 1
    color = rgba(255, 0, 40, 0.22)
    rounding = 0
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    position = 0, 40
    halign = center
    valign = center
}

# ============================================================
# USUARIO
# ============================================================
label {
    monitor =
    text = 󰀄  gamase
    color = rgba(155, 10, 10, 0.62)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 16
    halign = center
    valign = center
}

# ============================================================
# INPUT FIELD
# ============================================================
input-field {
    monitor =
    size = 296, 46
    outline_thickness = 2
    dots_size = 0.27
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(255, 0, 35, 0.62)
    inner_color = rgba(5, 0, 10, 0.90)
    font_color = rgba(255, 25, 25, 1.0)
    check_color = rgba(255, 140, 0, 0.95)
    fail_color = rgba(255, 30, 30, 0.90)
    capslock_color = rgba(255, 200, 0, 0.90)
    placeholder_text = <span foreground="##771111">[ ACCESS CODE ]</span>
    fail_text = <span foreground="##ff2222"> $FAIL</span>
    fade_on_empty = true
    fade_timeout = 2000
    rounding = 10
    position = 0, -52
    halign = center
    valign = center
}

# ============================================================
# MENSAJE DE FALLO
# ============================================================
label {
    monitor =
    text = $FAIL
    color = rgba(255, 50, 30, 0.85)
    font_size = 11
    font_family = JetBrains Mono Bold
    position = 0, -106
    halign = center
    valign = center
}

# ============================================================
# ESQUINA INFERIOR IZQUIERDA — OS
# ============================================================
label {
    monitor =
    text = 󰣇  Arch Linux
    color = rgba(110, 5, 5, 0.50)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 24, 20
    halign = left
    valign = bottom
}

# ============================================================
# ESQUINA INFERIOR DERECHA — Uptime
# ============================================================
label {
    monitor =
    text = cmd[update:60000] uptime -p | sed 's/up //'
    color = rgba(110, 5, 5, 0.50)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -24, 20
    halign = right
    valign = bottom
}
