# ~/.config/hypr/hyprlock.conf

background {
    monitor =
    path = /home/gamase/Downloads/fondo.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.5
}

# Reloj
label {
    monitor =
    text = $TIME
    color = rgba(255, 30, 30, 1.0)
    font_size = 72
    font_family = JetBrains Mono Bold
    position = -60, 60
    halign = right
    valign = bottom
}

# Fecha - DEBAJO del reloj, misma fuente
label {
    monitor =
    text = cmd[update:1000] date +"%Y-%m-%d"
    color = rgba(255, 30, 30, 0.8)
    font_size = 18
    font_family = JetBrains Mono Bold
    position = -60, 40
    halign = right
    valign = bottom
}

# Input field - centro de pantalla
input-field {
    monitor =
    size = 300, 45
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(255, 30, 30, 0.8)
    inner_color = rgba(10, 0, 0, 0.9)
    font_color = rgba(255, 30, 30, 1.0)
    check_color = rgba(255, 30, 30, 1.0)
    fail_color = rgba(255, 0, 0, 1.0)
    placeholder_text = <span foreground="##ff1e1e">[ ENTER PASSWORD ]</span>
    position = 0, 0
    halign = center
    valign = center
}
